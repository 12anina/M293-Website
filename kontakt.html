 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konakt</title>
</head>
<body>
    <!-- ========== KONTAKT ========== -->
  <section class="page" id="kontakt">
     <nav class="navbar">
        <p>Anina Habrik</p>
        <div class="nav-links">
            <a href="aboutme.html">About me</a>
            <a href="skills.html">Skills</a>
            <a href="portfolio.html" class="active">Portfolio</a>
            <a href="kontakt.html">Kontakt</a>
        </div>
    </nav>

    
    <!-- Kontaktangaben Banner -->
    <div class="kontakt-banner">
      <span class="kontakt-label">Kontaktangaben</span>
      <span class="kontakt-adresse">Adresse: Lorem ipsum dolor sit amet, consectetur adipisicing elit. Harum dolor id sed delectus facere pariatur libero dicta</span>
    </div>
    <!-- Formular -->
    <div class="kontakt-formular-wrapper">
      <h2>Kontaktformular</h2>
      <div class="formular-box">
        <div class="form-row">
          <div class="form-group">
            <label for="vorname">Vorname:</label>
            <input type="text" id="vorname" name="vorname" />
          </div>
          <div class="form-group">
            <label for="nachname">Nachname:</label>
            <input type="text" id="nachname" name="nachname" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="telefon">Telefonnummer:</label>
            <input type="tel" id="telefon" name="telefon" />
          </div>
          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" />
          </div>
        </div>
        <div class="form-group full-width">
          <label for="nachricht">Nachricht an mich:</label>
          <textarea id="nachricht" name="nachricht" rows="5"></textarea>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
